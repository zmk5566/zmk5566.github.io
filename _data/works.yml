- year: "2016"
  title: "Detached Organ"
  summary: "A contemporary music piece in collaboration with Ruilei Duan. With help from computer vision and robotics, we were able to turn the audience's phones into instruments that could be instructed, so everyone could participate."
  video:
    src: /res/detached_organ(2016).mp4
    label: "Detached Organ video"
