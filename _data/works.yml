- year: "2026"
  title: "The Discourse of an Instrument, and a Thousand Machines 弦语千机"
  summary: "A Guqin performance powered by Qianji, turning audience smartphones into a distributed luminous and acoustic field. The largest live array reached 421 audience phones, which is honestly a lot of tiny machines behaving together."
